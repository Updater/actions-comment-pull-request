---
# Managed by Updater/terraform-github-upg — DO NOT EDIT directly.
#
# Native replacement for the PR labelling that the decommissioned gitStream
# automation used to perform (ACT-71). Applies:
#   * AI-tool labels (🤖 Claude Code / 🤖 Copilot / 🤖 Codex / 🤖 ai-warp) from
#     commit-message signatures or #claude_code# / #copilot# / #codex# / #warp#
#     tags in the title/description.
#   * a missing-jira label + reminder comment when no Jira ticket is referenced
#     in the PR title or description.
#
# Uses pull_request_target so the workflow runs with the base repo's token
# (write access for labelling, even on fork PRs). It only reads PR metadata via
# the API and never checks out PR head code, so it is not exposed to the
# pull_request_target privilege-escalation risk.

name: PR Labeler

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited]

concurrency:
  group: pr-labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Apply labels
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const issue_number = pr.number;
            const title = pr.title || '';
            const body = pr.body || '';
            const titleAndBody = `${title}\n${body}`;

            // Pull every commit message on the PR.
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner, repo, pull_number: issue_number, per_page: 100,
            });
            const commitMessages = commits.map(c => c.commit.message).join('\n');

            const currentLabels = (pr.labels || []).map(l => l.name);
            const hasLabel = (name) => currentLabels.includes(name);

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (e) {
                if (e.status !== 404) throw e;
                try {
                  await github.rest.issues.createLabel({ owner, repo, name, color, description });
                } catch (e2) {
                  // 422 = a concurrent run created it between getLabel and createLabel.
                  if (e2.status !== 422) throw e2;
                }
              }
            }
            async function addLabel(name, color, description) {
              await ensureLabel(name, color, description);
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [name] });
            }
            async function removeLabel(name) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
              } catch (e) {
                if (e.status !== 404) throw e;
              }
            }

            // ---- AI-tool detection (commit signatures + #tags#) -------------
            const isClaudeCode =
              /🤖 Generated with \[Claude Code\]/.test(commitMessages) ||
              /Co-Authored-By: Claude.*<noreply@anthropic\.com>/i.test(commitMessages) ||
              /#claude_code#/.test(titleAndBody);
            const isCopilot =
              /Co-authored-by: github-copilot/i.test(commitMessages) ||
              /Generated by GitHub Copilot/i.test(commitMessages) ||
              /with GitHub Copilot/i.test(commitMessages) ||
              /#copilot#/.test(titleAndBody);
            const isCodex =
              /Co-authored-by: Codex <codex@openai\.com>/i.test(commitMessages) ||
              /<codex@openai\.com>/i.test(commitMessages) ||
              /#codex#/.test(titleAndBody);
            // Warp's agent commits with a @warp.dev co-author (name varies) and
            // links app.warp.dev conversations in the body.
            const isWarp =
              /<[^>]*@warp\.dev>/i.test(commitMessages) ||
              /app\.warp\.dev/i.test(titleAndBody) ||
              /#warp#/.test(titleAndBody);

            if (isClaudeCode && !hasLabel('🤖 Claude Code')) {
              await addLabel('🤖 Claude Code', '8A2BE2', 'PR includes Claude Code-assisted changes');
            }
            if (isCopilot && !hasLabel('🤖 Copilot')) {
              await addLabel('🤖 Copilot', '6E5494', 'PR includes GitHub Copilot-assisted changes');
            }
            if (isCodex && !hasLabel('🤖 Codex')) {
              await addLabel('🤖 Codex', '10A37F', 'PR includes OpenAI Codex-assisted changes');
            }
            // Match the pre-existing org label name/color/description exactly.
            if (isWarp && !hasLabel('🤖 ai-warp')) {
              await addLabel('🤖 ai-warp', '6F42C1', 'Created by Warp AI agent');
            }

            // ---- missing-jira -----------------------------------------------
            // A bare KEY-123 over title + body covers both gitStream forms (bare
            // key in title, browse URL in body) without its 3-4 digit limit.
            const hasJira = /\b[A-Za-z]+-\d+\b/.test(titleAndBody);
            if (!hasJira) {
              if (!hasLabel('missing-jira')) {
                await addLabel('missing-jira', 'B60205', 'PR is missing a Jira ticket reference');
                await github.rest.issues.createComment({
                  owner, repo, issue_number,
                  body: [
                    'This PR is missing a Jira ticket reference in the title or description.',
                    'Please add a Jira ticket reference to the title or description of this PR.',
                  ].join('\n'),
                });
              }
            } else {
              // Clear the label once a ticket reference is added.
              await removeLabel('missing-jira');
            }
